<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio-Generated Isometric City</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  </head>
  <body>
    <main class="hud">
      <h1>Audio-Generated Isometric City</h1>
      <p>Upload a track and press play. The music gradually draws a clean architectural 2.5D city.</p>
      <div class="controls">
        <button id="chooseAudio" type="button">Choose Audio</button>
        <button id="playPause" type="button" disabled>Play</button>
      </div>
      <p id="audioStatus">No audio loaded.</p>
      <p id="cityStats">Buildings: 0</p>
    </main>

    <aside id="buildingInfo" class="building-info" aria-live="polite">
      <h2>Building Archive</h2>
      <p>Click a generated building to inspect its audio data.</p>
    </aside>

    <input id="audioInput" type="file" accept="audio/*" hidden />
    <audio id="audioPlayer" hidden></audio>
    <script src="js/audio-mechanic.js"></script>
    <script src="js/time-mechanic.js"></script>
    <script src="js/random-mechanic.js"></script>
    <script src="js/input-mechanic.js"></script>
    <script src="js/sketch.js"></script>
  </body>
</html>
